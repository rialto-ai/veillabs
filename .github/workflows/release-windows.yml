name: Release Veil Scribe (Windows)

# Builds the rebranded Veil Scribe desktop app (desktop/) into a Windows
# installer and publishes it to this repo's Releases. Split into two jobs so
# a publish failure can be retried (Re-run failed jobs) without a full rebuild.
#
# Trigger by pushing a `veil-scribe-v*` tag, or run manually.
on:
  workflow_dispatch:
  push:
    tags:
      - "veil-scribe-v*"

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      signed: ${{ steps.signcfg.outputs.enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: ver
        shell: bash
        run: |
          v=$(grep -o '"version": "[^"]*"' desktop/frontend/src-tauri/tauri.conf.json | head -1 | cut -d'"' -f4)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "App version: $v"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/frontend/pnpm-lock.yaml

      - name: Install Rust (msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop -> target

      # whisper-rs uses bindgen, which needs libclang. windows-latest ships LLVM.
      - name: Locate libclang
        shell: bash
        run: echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: pnpm install --no-frozen-lockfile

      - name: Build llama-helper sidecar
        working-directory: desktop
        shell: bash
        run: |
          cargo build --release -p llama-helper --target x86_64-pc-windows-msvc
          mkdir -p frontend/src-tauri/binaries
          cp "target/x86_64-pc-windows-msvc/release/llama-helper.exe" \
             "frontend/src-tauri/binaries/llama-helper-x86_64-pc-windows-msvc.exe"

      - name: Build Veil Scribe (Windows installer)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop/frontend
          args: --target x86_64-pc-windows-msvc

      # Code signing is optional: it stays dormant until the Azure Trusted
      # Signing secrets are present, so builds keep working before it's set up.
      - name: Check signing config
        id: signcfg
        shell: bash
        run: |
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Azure Trusted Signing not configured — shipping unsigned."
          fi

      - name: Sign installers (Azure Trusted Signing)
        if: steps.signcfg.outputs.enabled == 'true'
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_TS_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_TS_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_TS_PROFILE }}
          files-folder: desktop/target/x86_64-pc-windows-msvc/release/bundle
          files-folder-filter: msi,exe
          files-folder-recurse: true

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: veil-scribe-windows
          if-no-files-found: error
          path: |
            desktop/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            desktop/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

  publish:
    name: Publish release
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: veil-scribe-windows
          path: dist

      # Publish a stable, version-less copy of the installer so the website can
      # link to /releases/latest/download/Veil-Scribe-Setup-x64.exe forever
      # (no per-release edits). The versioned originals are kept too.
      - name: Add stable-named installer
        shell: bash
        run: |
          setup=$(find dist -name "*-setup.exe" | head -1)
          if [ -n "$setup" ]; then
            cp "$setup" "dist/Veil-Scribe-Setup-x64.exe"
            echo "Stable copy: $(ls -lh dist/Veil-Scribe-Setup-x64.exe)"
          else
            echo "No NSIS -setup.exe found"; exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: veil-scribe-v${{ needs.build-windows.outputs.version }}
          name: Veil Scribe v${{ needs.build-windows.outputs.version }}
          body: |
            Veil Scribe for Windows — local-first meeting intelligence by Veil Labs.

            ${{ needs.build-windows.outputs.signed == 'true' && 'Signed with Azure Trusted Signing.' || 'This build is unsigned, so Windows SmartScreen may warn on first launch (More info → Run anyway).' }}

            Captured locally; nothing leaves your device.
          files: dist/**/*
          fail_on_unmatched_files: true
